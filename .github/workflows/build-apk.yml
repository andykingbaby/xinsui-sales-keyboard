name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: |
          unzip -o xinsui_ai_sales_keyboard_android_github_build.zip
          ls -la
          ls -la xinsui_ai_sales_keyboard_android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: xinsui_ai_sales_keyboard_android
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xinsui-ai-sales-keyboard-debug-apk
          path: xinsui_ai_sales_keyboard_android/app/build/outputs/apk/debug/app-debug.apk
